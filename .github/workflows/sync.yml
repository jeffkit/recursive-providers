name: Sync providers from LiteLLM

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run sync script
        run: python3 scripts/sync_providers.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet providers.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sync-providers
          commit-message: "chore(sync): update pricing from LiteLLM"
          title: "chore(sync): update provider pricing from LiteLLM"
          body: |
            Auto-synced from [LiteLLM model_prices_and_context_window.json](https://github.com/BerriAI/litellm/blob/main/model_prices_and_context_window.json).

            Changes detected by `scripts/sync_providers.py`. Please review the diff before merging.
          labels: automated
